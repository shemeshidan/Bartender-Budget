<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BARTENDER — ניהול תקציב</title>
  <meta name="theme-color" content="#0B0705">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:       #0B0705;
      --dark2:      #160F08;
      --dark3:      #221508;
      --parchment:  #F2E8C6;
      --parchment2: #E6D8A8;
      --gold:       #C8941A;
      --gold2:      #E8B830;
      --copper:     #A05A20;
      --ink:        #1A0E06;
      --text:       #EEE0BC;
      --red:        #8B1A1A;
      --green:      #1A6B2A;
      --green-lit:  #2d9e40;
      --red-lit:    #c0392b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow: hidden;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100svh;
      margin: 0 auto;
      overflow: hidden;
      background: var(--dark);
    }

    /* ─── SCREEN SYSTEM ─────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      transform: translateX(110%);
      transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
      z-index: 2;
      background: var(--dark);
    }
    .screen.active  { transform: translateX(0); }
    .screen.exiting { transform: translateX(110%); }
    .screen::-webkit-scrollbar { width: 0; }

    #home {
      transform: translateX(0);
      z-index: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── LOCK SCREEN ───────────────────────────────────── */
    #lock {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      background:
        radial-gradient(ellipse at 50% 25%, rgba(200,148,26,.18) 0%, transparent 60%),
        var(--dark);
    }

    .lock-emoji {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 16px;
      animation: float 4s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .lock-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 10px;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(200,148,26,.5), 0 2px 0 rgba(0,0,0,.6);
    }

    .lock-sub {
      font-size: 10.5px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(238,224,188,.4);
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 42px;
    }

    .lock-ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      width: 100%;
    }
    .lock-ornament::before, .lock-ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .lock-ornament span { color: var(--gold); font-size: 11px; }

    .lock-inp {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(200,148,26,.28);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 20px;
      color: var(--text);
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      margin-bottom: 14px;
      -webkit-appearance: none;
      direction: ltr;
    }
    .lock-inp::placeholder { letter-spacing: 4px; color: rgba(238,224,188,.25); font-size: 16px; }
    .lock-inp:focus { border-color: rgba(200,148,26,.65); }

    .lock-btn {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s, background 0.15s;
    }
    .lock-btn:active { transform: scale(0.96); background: var(--gold2); }

    .lock-err {
      color: #e05c5c;
      font-size: 12.5px;
      text-align: center;
      margin-top: 11px;
      min-height: 18px;
    }

    /* ─── HOME SCREEN ───────────────────────────────────── */
    .home-wrap {
      min-height: 100%;
      background:
        radial-gradient(ellipse at 10% 15%, rgba(200,148,26,.16) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 85%, rgba(160,90,32,.10) 0%, transparent 55%),
        var(--dark);
      padding: 18px 16px 80px;
    }

    .home-hdr {
      text-align: center;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .home-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 10px;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(200,148,26,.45), 0 2px 0 rgba(0,0,0,.6);
    }

    .home-sub {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(238,224,188,.38);
      text-transform: uppercase;
      margin-top: 5px;
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 18px;
      position: relative;
      z-index: 1;
    }
    .ornament::before, .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .ornament span { color: var(--gold); font-size: 11px; }

    /* ─── TIME TABS ─────────────────────────────────────── */
    /* ─── MONTHS PICKER ────────────────────────────────── */
    .months-picker {
      background: rgba(200,148,26,.07);
      border: 1px solid rgba(200,148,26,.2);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .months-available {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .8px;
      color: rgba(238,224,188,.38);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }
    .months-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .months-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(200,148,26,.15);
      border: 1px solid rgba(200,148,26,.3);
      color: var(--gold);
      font-size: 20px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      line-height: 1;
      user-select: none;
    }
    .months-btn:active { transform: scale(0.88); background: rgba(200,148,26,.3); }
    .months-btn:disabled { opacity: 0.25; pointer-events: none; }
    .months-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: var(--gold);
      letter-spacing: 2px;
      line-height: 1;
      min-width: 48px;
      text-align: center;
    }
    .months-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(238,224,188,.5);
      text-align: center;
      line-height: 1.3;
    }

    .period-label {
      text-align: center;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: rgba(238,224,188,.32);
      text-transform: uppercase;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    /* ─── SUMMARY CARDS ────────────────────────────────── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .summary-card {
      background: linear-gradient(140deg, var(--dark2), rgba(200,148,26,.05));
      border: 1px solid rgba(200,148,26,.18);
      border-radius: 18px;
      padding: 14px 14px 12px;
      position: relative;
      overflow: hidden;
    }

    .summary-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 0 0 18px 18px;
    }
    .summary-card.income::after  { background: linear-gradient(90deg, #1A6B2A, var(--green-lit)); }
    .summary-card.expense::after { background: linear-gradient(90deg, var(--red), var(--red-lit)); }
    .summary-card.profit::after  { background: linear-gradient(90deg, var(--copper), var(--gold)); }
    .summary-card.pct::after     { background: linear-gradient(90deg, var(--gold), var(--gold2)); }

    .summary-icon {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 18px;
      opacity: 0.3;
    }

    .summary-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .8px;
      color: rgba(238,224,188,.4);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .summary-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 27px;
      letter-spacing: 1px;
      line-height: 1;
    }
    .summary-card.income  .summary-value { color: #4dbf65; }
    .summary-card.expense .summary-value { color: #e05c5c; }
    .summary-card.profit  .summary-value { color: var(--gold); }
    .summary-card.pct     .summary-value { color: var(--gold2); }

    /* ─── BREAKDOWN ─────────────────────────────────────── */
    .breakdown-box {
      background: rgba(200,148,26,.06);
      border: 1px solid rgba(200,148,26,.17);
      border-radius: 18px;
      padding: 15px 14px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .breakdown-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 2.5px;
      color: var(--gold);
      margin-bottom: 13px;
    }

    .bk-row { margin-bottom: 11px; }
    .bk-row:last-child { margin-bottom: 0; }

    .bk-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .bk-cat { font-size: 12px; font-weight: 700; color: var(--text); }
    .bk-amt { font-size: 12px; font-weight: 800; color: var(--gold); }

    .bk-bar-bg {
      height: 5px;
      background: rgba(255,255,255,.07);
      border-radius: 3px;
      overflow: hidden;
    }

    .bk-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--copper), var(--gold));
      border-radius: 3px;
      transition: width 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ─── ACTION BUTTONS ────────────────────────────────── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .action-btn {
      background: linear-gradient(140deg, var(--dark2), rgba(200,148,26,.07));
      border: 1px solid rgba(200,148,26,.22);
      border-radius: 18px;
      padding: 18px 10px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      min-height: 90px;
      justify-content: center;
    }
    .action-btn:active { transform: scale(0.93); background: rgba(200,148,26,.13); border-color: rgba(200,148,26,.5); }

    .action-btn.income-btn { border-color: rgba(45,158,64,.35); }
    .action-btn.income-btn:active { background: rgba(45,158,64,.1); border-color: rgba(45,158,64,.7); }

    .action-icon  { font-size: 30px; line-height: 1; }
    .action-label { font-size: 13px; font-weight: 800; color: var(--parchment); line-height: 1.2; text-align: center; }

    .history-link-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(200,148,26,.18);
      border-radius: 14px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: rgba(238,224,188,.55);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
      position: relative;
      z-index: 1;
    }
    .history-link-btn:active { background: rgba(200,148,26,.08); color: var(--gold); border-color: rgba(200,148,26,.35); }
    .history-link-btn span:last-child { color: var(--gold); font-size: 20px; line-height: 1; }

    /* ─── SCREEN HEADER ─────────────────────────────────── */
    .screen-hdr {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,7,5,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(200,148,26,.2);
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(200,148,26,.12);
      border: 1px solid rgba(200,148,26,.28);
      color: var(--gold);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      line-height: 1;
    }
    .back-btn:active { transform: scale(0.88); }

    .hdr-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--gold);
      flex: 1;
    }

    .hdr-icon { font-size: 24px; }

    /* ─── CONTENT AREA ──────────────────────────────────── */
    .content { padding: 18px 15px 60px; }

    .sec-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 2.5px;
      color: var(--gold);
      border-bottom: 1px solid rgba(200,148,26,.3);
      padding-bottom: 7px;
      margin-bottom: 18px;
      margin-top: 0;
    }

    /* ─── FORM ELEMENTS ─────────────────────────────────── */
    .field-lbl {
      font-size: 11px;
      font-weight: 700;
      color: var(--copper);
      letter-spacing: .5px;
      margin-bottom: 6px;
      display: block;
    }

    .field-mb { margin-bottom: 16px; }

    .inp {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(200,148,26,.25);
      border-radius: 11px;
      padding: 11px 13px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      direction: rtl;
      box-sizing: border-box;
    }
    .inp::placeholder { color: rgba(238,224,188,.22); }
    .inp:focus { border-color: rgba(200,148,26,.6); }
    .inp[type=number]  { -moz-appearance: textfield; }
    .inp[type=number]::-webkit-outer-spin-button,
    .inp[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .inp[type=week],
    .inp[type=date] { color-scheme: dark; }
    textarea.inp { resize: none; min-height: 82px; }

    /* ─── CATEGORY PILLS ────────────────────────────────── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cat-pill {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(200,148,26,.2);
      border-radius: 12px;
      padding: 11px 8px;
      text-align: center;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: rgba(238,224,188,.5);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
      line-height: 1.35;
      user-select: none;
    }
    .cat-pill:active { transform: scale(0.94); }
    .cat-pill.selected {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }
    .cat-pill.wide { grid-column: span 2; }

    /* ─── PRIMARY BUTTON ────────────────────────────────── */
    .primary-btn {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
      border: none;
      border-radius: 13px;
      padding: 14px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s, background 0.15s;
      margin-top: 8px;
    }
    .primary-btn:active  { transform: scale(0.96); background: var(--gold2); }
    .primary-btn:disabled { opacity: 0.42; pointer-events: none; }

    /* ─── MONTH NAV ─────────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(200,148,26,.09);
      border: 1px solid rgba(200,148,26,.22);
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .month-nav-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: rgba(200,148,26,.14);
      border: 1px solid rgba(200,148,26,.28);
      color: var(--gold);
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
      user-select: none;
    }
    .month-nav-btn:active { transform: scale(0.88); }
    .month-nav-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--gold);
    }

    /* ─── WEEK ROWS (income) ─────────────────────────────── */
    .week-row {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(200,148,26,.13);
      border-radius: 13px;
      padding: 11px 13px;
      margin-bottom: 8px;
    }
    .week-lbl {
      font-size: 11px;
      font-weight: 700;
      color: rgba(238,224,188,.4);
      letter-spacing: .4px;
      margin-bottom: 8px;
    }
    .week-inputs {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .week-inp { flex: 1; }
    .week-amt {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--gold);
      min-width: 72px;
      text-align: left;
      flex-shrink: 0;
    }
    .inc-total-row {
      background: rgba(200,148,26,.1);
      border: 1px solid rgba(200,148,26,.3);
      border-radius: 13px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      margin-bottom: 16px;
    }
    .inc-total-lbl { font-size: 12px; font-weight: 700; color: rgba(238,224,188,.5); }
    .inc-total-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold2);
      letter-spacing: 1px;
    }

    /* ─── EXPENSE ROWS ───────────────────────────────────── */
    .exp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      animation: fadeUp 0.2s ease both;
    }
    .exp-amount-inp { flex: 1; min-width: 0; }
    .exp-cat-sel {
      flex: 1.3;
      min-width: 0;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(200,148,26,.25);
      border-radius: 11px;
      padding: 11px 8px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      direction: rtl;
    }
    .exp-cat-sel option { background: #221508; }
    .del-row-btn {
      width: 34px; height: 34px;
      background: rgba(139,26,26,.2);
      border: 1px solid rgba(139,26,26,.3);
      border-radius: 10px;
      color: rgba(238,224,188,.4);
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .del-row-btn:active { color: #e05c5c; background: rgba(139,26,26,.4); }
    .exp-note-inp {
      margin-bottom: 8px;
      margin-right: 0;
    }
    .add-row-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(200,148,26,.3);
      border-radius: 12px;
      padding: 10px;
      color: rgba(200,148,26,.6);
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .add-row-btn:active { background: rgba(200,148,26,.08); color: var(--gold); }

    /* ─── CAT FIXED ROWS ────────────────────────────────── */
    .cat-fixed-row {
      margin-bottom: 12px;
    }

<script>
/* ─── CONSTANTS ──────────────────────────────────────────────────────────── */
const PIN = '1234';

const CATS = {
  'כרם':       { label: 'שתייה — הכרם', icon: '🍷' },
  'רשף':       { label: 'שתייה — רשף',  icon: '🥃' },
  'כרטיסיות':  { label: 'כרטיסיות',      icon: '🎫' },
  'סופר':      { label: 'סופר',          icon: '🛒' },
  'שונות':     { label: 'שונות',         icon: '📌' },
};

const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                   'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

/* ─── NAVIGATION ─────────────────────────────────────────────────────────── */
const navStack = [];

function go(id) {
  const cur = document.querySelector('.screen.active');
  if (cur) {
    cur.classList.remove('active');
    cur.classList.add('exiting');
    setTimeout(() => cur.classList.remove('exiting'), 460);
  }
  const next = document.getElementById(id);
  if (next) next.classList.add('active');
  navStack.push(id);
  if (id === 'history')    { loadData().then(() => renderHistory()); }
  if (id === 'add-income') renderIncomeMonth();
  if (id === 'add-expense') { renderExpMonth(); if (!expRowIds.length) addExpRow(); }
}

function back() {
  navStack.pop();
  const cur = document.querySelector('.screen.active');
  if (cur) {
    cur.classList.remove('active');
    cur.classList.add('exiting');
    setTimeout(() => cur.classList.remove('exiting'), 460);
  }
  const prevId = navStack.length ? navStack[navStack.length - 1] : 'home';
  const prev = document.getElementById(prevId);
  if (prev) prev.classList.add('active');
}

/* ─── INIT ───────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  navStack.push('home');
  firebase.auth().signInAnonymously()
    .then(() => initData())
    .catch(e => console.warn('auth:', e));
});

/* ─── DATA STATE ─────────────────────────────────────────────────────────── */
let allIncome   = [];
let allExpenses = [];
let curMonths   = 3;
let totalMonths = 0;
let curHistTab  = 'all';
let expRowIds   = [];
let isSaving    = false;

async function initData() {
  await loadData();
}

async function loadData() {
  // מחכה לחיבור אמיתי לשרת Firebase
  await new Promise(resolve => {
    const ref = db.ref('.info/connected');
    ref.on('value', snap => {
      if (snap.val() === true) { ref.off('value'); resolve(); }
    });
  });
  const [incSnap, expSnap] = await Promise.all([
    db.ref('/budget/income').once('value'),
    db.ref('/budget/expenses').once('value'),
  ]);
  console.log('snap children — income:', incSnap.numChildren(), 'expenses:', expSnap.numChildren());
  allIncome = [];
  incSnap.forEach(ch => {
    const v = ch.val();
    if (v && typeof v === 'object') allIncome.push({ id: ch.key, ...v });
  });
  allIncome.sort((a, b) => b.ts - a.ts);

  allExpenses = [];
  expSnap.forEach(ch => {
    const v = ch.val();
    if (v && typeof v === 'object') allExpenses.push({ id: ch.key, ...v });
  });
  allExpenses.sort((a, b) => b.ts - a.ts);

  console.log('loaded income:', allIncome.length, 'expenses:', allExpenses.length);
  renderDashboard();
}


function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const y = d.getUTCFullYear();
  const yearStart = new Date(Date.UTC(y, 0, 1));
  const w = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${y}-W${String(w).padStart(2, '0')}`;
}

/* ─── MONTHS PICKER ──────────────────────────────────────────────────────── */
function addMonths(delta) {
  const next = curMonths + delta;
  if (next < 1) return;
  curMonths = next;
  renderDashboard();
}

function updateMonthsPicker() {
  const allEntries = [...allIncome, ...allExpenses];
  if (!allEntries.length) { totalMonths = 1; return; }
  const oldest = Math.min(...allEntries.map(e => e.ts));
  const now = new Date();
  const oldDate = new Date(oldest);
  totalMonths = (now.getFullYear() - oldDate.getFullYear()) * 12 + (now.getMonth() - oldDate.getMonth()) + 1;
  if (curMonths > totalMonths) curMonths = totalMonths;
  document.getElementById('months-available').textContent =
    `נתונים מ־${totalMonths} חודשים (${HE_MONTHS[oldDate.getMonth()]} ${oldDate.getFullYear()})`;
  document.getElementById('months-num').textContent = curMonths;
  document.getElementById('btn-minus').disabled = curMonths <= 1;
  document.getElementById('btn-plus').disabled  = curMonths >= totalMonths;
}

function getPeriodRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - (curMonths - 1), 1);
  return { start: start.getTime(), end: now.getTime() };
}

function getPeriodLabel() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - (curMonths - 1), 1);
  if (curMonths === 1) return `${HE_MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  return `${HE_MONTHS[start.getMonth()]} ${start.getFullYear()} — ${HE_MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}

/* ─── DASHBOARD ──────────────────────────────────────────────────────────── */
function renderDashboard() {
  updateMonthsPicker();
  document.getElementById('months-num').textContent = curMonths;
  const { start, end } = getPeriodRange();
  document.getElementById('period-lbl').textContent = getPeriodLabel();

  const inc = allIncome.filter(e => e.ts >= start && e.ts <= end);
  const exp = allExpenses.filter(e => e.ts >= start && e.ts <= end);

  const totalInc = inc.reduce((s, e) => s + (e.amount || 0), 0);
  const totalExp = exp.reduce((s, e) => s + (e.amount || 0), 0);
  const profit   = totalInc - totalExp;
  const pct      = totalInc > 0 ? Math.round((profit / totalInc) * 100) : null;

  document.getElementById('s-income').textContent  = '₪' + fmt(totalInc);
  document.getElementById('s-expense').textContent = '₪' + fmt(totalExp);
  document.getElementById('s-profit').textContent  = (profit < 0 ? '-₪' : '₪') + fmt(Math.abs(profit));
  document.getElementById('s-pct').textContent     = pct !== null ? pct + '%' : '—';

  // Breakdown
  const catTotals = {};
  Object.keys(CATS).forEach(k => { catTotals[k] = 0; });
  exp.forEach(e => { if (catTotals[e.category] !== undefined) catTotals[e.category] += (e.amount || 0); });

  const bd = document.getElementById('breakdown-body');
  const entries = Object.entries(catTotals).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);

  if (!entries.length) {
    bd.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>אין הוצאות בתקופה</div>';
    return;
  }

  const maxVal = entries[0][1] || 1;
  bd.innerHTML = entries.map(([cat, val]) => `
    <div class="bk-row">
      <div class="bk-top">
        <span class="bk-cat">${CATS[cat].icon} ${CATS[cat].label}</span>
        <span class="bk-amt">₪${fmt(val)}</span>
      </div>
      <div class="bk-bar-bg">
        <div class="bk-bar" style="width:${Math.round((val/maxVal)*100)}%"></div>
      </div>
    </div>
  `).join('');
}

function fmt(n) {
  return Number(n).toLocaleString('he-IL');
}

/* ─── INCOME — MONTHLY ───────────────────────────────────────────────────── */
const TICKET_PRICE = 100;
let incMonth = new Date();
incMonth = new Date(incMonth.getFullYear(), incMonth.getMonth(), 1);

function incChangeMonth(delta) {
  incMonth = new Date(incMonth.getFullYear(), incMonth.getMonth() + delta, 1);
  renderIncomeMonth();
}

function renderIncomeMonth() {
  const y = incMonth.getFullYear();
  const m = incMonth.getMonth();
  document.getElementById('inc-month-lbl').textContent = `${HE_MONTHS[m]} ${y}`;
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const weeks = [];
  for (let day = 1; day <= daysInMonth; day += 7) {
    weeks.push({ num: weeks.length + 1, start: day, end: Math.min(day + 6, daysInMonth) });
  }
  document.getElementById('inc-weeks-wrap').innerHTML = weeks.map(w => `
    <div class="week-row">
      <div class="week-lbl">שבוע ${w.num} · ${w.start}–${w.end} ב${HE_MONTHS[m]}</div>
      <div class="week-inputs">
        <input type="number" class="inp week-inp" placeholder="כרטיסיות" min="0"
          data-week="${w.num}" data-day="${w.start}" oninput="updateIncTotal()">
        <div class="week-amt" id="week-amt-${w.num}">₪0</div>
      </div>
    </div>
  `).join('');

  // טעינת נתונים קיימים מ-Firebase
  allIncome.forEach(entry => {
    const d = new Date(entry.ts);
    if (d.getFullYear() !== y || d.getMonth() !== m) return;
    const weekNum = Math.ceil(d.getDate() / 7);
    const inp = document.querySelector(`.week-inp[data-week="${weekNum}"]`);
    if (inp && !inp.value) inp.value = entry.tickets;
  });

  updateIncTotal();
}

function updateIncTotal() {
  let total = 0;
  document.querySelectorAll('.week-inp').forEach(inp => {
    const n = parseInt(inp.value) || 0;
    const amt = n * TICKET_PRICE;
    total += amt;
    document.getElementById('week-amt-' + inp.dataset.week).textContent = amt > 0 ? '₪' + fmt(amt) : '₪0';
  });
  document.getElementById('inc-total').textContent = '₪' + fmt(total);
}

async function ensureAuth() {
  const user = firebase.auth().currentUser;
  if (user) return;
  await firebase.auth().signInAnonymously();
  await new Promise(resolve => {
    const unsub = firebase.auth().onAuthStateChanged(u => { if (u) { unsub(); resolve(); } });
  });
}

async function saveMonthIncome() {
  if (isSaving) return;
  const rows = document.querySelectorAll('.week-inp');
  const entries = [];
  rows.forEach(inp => {
    const tickets = parseInt(inp.value) || 0;
    if (tickets <= 0) return;
    const day = parseInt(inp.dataset.day);
    const ts = new Date(incMonth.getFullYear(), incMonth.getMonth(), day, 12).getTime();
    const weekNum = inp.dataset.week;
    entries.push({
      weekLabel: `שבוע ${weekNum} — ${HE_MONTHS[incMonth.getMonth()]} ${incMonth.getFullYear()}`,
      weekValue: `w${weekNum}`,
      tickets, amount: tickets * TICKET_PRICE, ts
    });
  });
  if (!entries.length) { showToast(`לא הוזנו כרטיסיות עבור ${HE_MONTHS[incMonth.getMonth()]}`, true); return; }
  isSaving = true;
  const btn = document.getElementById('save-inc-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר…'; }
  try {
    const user = firebase.auth().currentUser;
    if (!user) await firebase.auth().signInAnonymously();
    // טעינה ישירה מFirebase ומחיקת נתוני החודש
    const y = incMonth.getFullYear(), m = incMonth.getMonth();
    const freshSnap = await db.ref('/budget/income').once('value');
    const delPromises = [];
    freshSnap.forEach(ch => {
      const v = ch.val();
      if (v && v.ts) {
        const d = new Date(v.ts);
        if (d.getFullYear() === y && d.getMonth() === m)
          delPromises.push(db.ref('/budget/income/' + ch.key).remove());
      }
    });
    await Promise.all(delPromises);
    // שמור את הנתונים החדשים
    await Promise.all(entries.map(e => db.ref('/budget/income').push(e)));
    showToast(`✓ ${HE_MONTHS[incMonth.getMonth()]} — ${entries.length} שבועות נשמרו`);
    curMonths = 12;
    await loadData();
    back();
  } catch(e) {
    console.error('save income error:', e);
    showToast('שגיאה: ' + e.message, true);
  } finally {
    isSaving = false;
    if (btn) { btn.disabled = false; btn.textContent = 'שמור חודש ✓'; }
  }
}

/* ─── EXPENSES — MONTHLY ─────────────────────────────────────────────────── */
let expMonth = new Date();
expMonth = new Date(expMonth.getFullYear(), expMonth.getMonth(), 1);

function expChangeMonth(delta) {
  expMonth = new Date(expMonth.getFullYear(), expMonth.getMonth() + delta, 1);
  renderExpMonth();
}

function renderExpMonth() {
  const y = expMonth.getFullYear();
  const m = expMonth.getMonth();
  document.getElementById('exp-month-lbl').textContent = `${HE_MONTHS[m]} ${y}`;

  // טוען ערכים קיימים לחודש זה
  const existing = {};
  allExpenses.forEach(e => {
    const d = new Date(e.ts);
    if (d.getFullYear() === y && d.getMonth() === m)
      existing[e.category] = e;
  });

  const wrap = document.getElementById('exp-rows-wrap');
  wrap.innerHTML = Object.entries(CATS).map(([key, cat]) => {
    const val = existing[key] ? existing[key].amount : '';
    const note = existing[key] ? (existing[key].note || '') : '';
    return `
      <div class="cat-fixed-row">
        <div class="cat-fixed-label">${cat.icon} ${cat.label}</div>
        <input type="number" class="inp cat-amt-inp" id="cat-amt-${key}"
          placeholder="₪" min="0" value="${val}">
        ${key === 'שונות' ? `<input type="text" class="inp cat-note-inp" id="cat-note-${key}" placeholder="פירוט…" value="${note}">` : ''}
      </div>
    `;
  }).join('');
}

function addExpRow() {
  const id = Date.now();
  expRowIds.push(id);
  const wrap = document.getElementById('exp-rows-wrap');
  const div = document.createElement('div');
  div.id = 'exp-row-' + id;
  div.innerHTML = `
    <div class="exp-row">
      <input type="number" class="inp exp-amount-inp" id="exp-amt-${id}" placeholder="סכום ₪" min="0">
      <select class="exp-cat-sel" id="exp-cat-${id}" onchange="onExpCat(${id})">
        <option value="">קטגוריה</option>
        <option value="כרם">🍷 הכרם</option>
        <option value="רשף">🥃 רשף</option>
        <option value="כרטיסיות">🎫 כרטיסיות</option>
        <option value="סופר">🛒 סופר</option>
        <option value="שונות">📌 שונות</option>
      </select>
      <button class="del-row-btn" onclick="removeExpRow(${id})">🗑</button>
    </div>
    <input type="text" class="inp exp-note-inp" id="exp-note-${id}"
      placeholder="פירוט…" style="display:none;margin-bottom:8px;">
  `;
  wrap.appendChild(div);
}

function onExpCat(id) {
  const val = document.getElementById('exp-cat-' + id).value;
  document.getElementById('exp-note-' + id).style.display = val === 'שונות' ? 'block' : 'none';
}

function removeExpRow(id) {
  document.getElementById('exp-row-' + id)?.remove();
  expRowIds = expRowIds.filter(r => r !== id);
}

async function saveMonthExpenses() {
  if (isSaving) return;
  const monthDate = `${expMonth.getFullYear()}-${String(expMonth.getMonth()+1).padStart(2,'0')}-15`;
  const baseTs = new Date(expMonth.getFullYear(), expMonth.getMonth(), 15, 12).getTime();
  const entries = [];
  let idx = 0;
  for (const key of Object.keys(CATS)) {
    const amtEl = document.getElementById('cat-amt-' + key);
    if (!amtEl) continue;
    const amount = parseFloat(amtEl.value) || 0;
    if (amount <= 0) continue;
    const noteEl = document.getElementById('cat-note-' + key);
    const note = noteEl ? noteEl.value.trim() : '';
    entries.push({ category: key, date: monthDate, amount, note, ts: baseTs + idx++ });
  }
  if (!entries.length) { showToast('לא הוזנו הוצאות', true); return; }
  isSaving = true;
  const btn = document.getElementById('save-exp-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'שומר…'; }
  try {
    const user = firebase.auth().currentUser;
    if (!user) await firebase.auth().signInAnonymously();
    const y = expMonth.getFullYear(), m = expMonth.getMonth();
    const freshSnap = await db.ref('/budget/expenses').once('value');
    const delPromises = [];
    freshSnap.forEach(ch => {
      const v = ch.val();
      if (v && v.ts && new Date(v.ts).getFullYear() === y && new Date(v.ts).getMonth() === m)
        delPromises.push(db.ref('/budget/expenses/' + ch.key).remove());
    });
    await Promise.all(delPromises);
    await Promise.all(entries.map(e => db.ref('/budget/expenses').push(e)));
    showToast(`נשמרו ${entries.length} הוצאות ✓`);
    curMonths = 12;
    await loadData();
    back();
  } catch(e) {
    showToast('שגיאה: ' + e.message, true);
  } finally {
    isSaving = false;
    if (btn) { btn.disabled = false; btn.textContent = 'שמור הוצאות ✓'; }
  }
}

/* ─── HISTORY ────────────────────────────────────────────────────────────── */
function setHistTab(tab) {
  curHistTab = tab;
  document.querySelectorAll('.hist-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.ht === tab));
  if (tab === 'bycat') renderByCategory();
  else renderHistory();
}

function renderByCategory() {
  const list = document.getElementById('hist-list');
  if (!allExpenses.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>אין הוצאות</div>';
    return;
  }
  list.innerHTML = Object.entries(CATS).map(([key, cat]) => {
    const entries = allExpenses.filter(e => e.category === key).sort((a, b) => b.ts - a.ts);
    if (!entries.length) return '';
    const total = entries.reduce((s, e) => s + (e.amount || 0), 0);
    const rows = entries.map(e => {
      const d = new Date(e.ts).toLocaleDateString('he-IL', { month: '2-digit', year: 'numeric' });
      return `<div class="bycat-row">
        <span class="bycat-date">${d}</span>
        ${e.note ? `<span style="color:#aaa;font-size:12px">${e.note}</span>` : '<span></span>'}
        <span class="bycat-amt">₪${fmt(e.amount)}</span>
      </div>`;
    }).join('');
    return `<div class="bycat-section">
      <div class="bycat-hdr">
        <span>${cat.icon} ${cat.label}</span>
        <span class="bycat-total">₪${fmt(total)}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function renderHistory() {
  let items = [];
  if (curHistTab !== 'expense') allIncome.forEach(e => items.push({ type: 'income',  ...e }));
  if (curHistTab !== 'income')  allExpenses.forEach(e => items.push({ type: 'expense', ...e }));
  items.sort((a, b) => b.ts - a.ts);

  const list = document.getElementById('hist-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>אין רשומות</div>';
    return;
  }

  list.innerHTML = items.map((item, i) => {
    const d       = new Date(item.ts);
    const dateStr = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const delay   = `animation-delay:${i * 0.04}s`;

    if (item.type === 'income') {
      return `<div class="hist-item" style="${delay}">
        <div class="hist-dot income"></div>
        <div class="hist-body">
          <div class="hist-title">📈 ${item.weekLabel || 'הכנסה'}</div>
          <div class="hist-meta">${item.tickets ? item.tickets + ' כרטיסים · ' : ''}${dateStr}</div>
        </div>
        <div class="hist-amount income">₪${fmt(item.amount || 0)}</div>
        <button class="del-btn" onclick="delEntry('income','${item.id}')">🗑</button>
      </div>`;
    } else {
      const cat = CATS[item.category] || { label: item.category, icon: '•' };
      return `<div class="hist-item" style="${delay}">
        <div class="hist-dot expense"></div>
        <div class="hist-body">
          <div class="hist-title">${cat.icon} ${cat.label}</div>
          <div class="hist-meta">${item.date || dateStr}${item.note ? ' · ' + item.note : ''}</div>
        </div>
        <div class="hist-amount expense">₪${fmt(item.amount || 0)}</div>
        <button class="del-btn" onclick="delEntry('expense','${item.id}')">🗑</button>
      </div>`;
    }
  }).join('');
}

function delEntry(type, id) {
  if (!confirm('למחוק רשומה זו?')) return;
  const path = type === 'income' ? 'income' : 'expenses';
  db.ref(`/budget/${path}/${id}`).remove()
    .then(() => showToast('נמחק'))
    .catch(() => showToast('שגיאה', true));
}

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = isErr ? 'err' : '';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
